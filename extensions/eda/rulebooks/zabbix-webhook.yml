---
- name: Receive Zabbix alerts via webhook
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Zabbix agent down - invoke Claude
      condition: 'event.payload.alert_name == "Linux: Zabbix agent is not available"'
      action:
        run_job_template:
          name: "Run Claude to analyse and fix"
          organization: "Default"
